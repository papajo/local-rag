<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>local-rag{% if title %} — {{ title }}{% endif %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .prose-code { font-size: 0.875em; }
    .entity-tag { display: inline-block; font-size: 0.75rem; padding: 0.125rem 0.375rem; border-radius: 0.25rem; background: #374151; color: #e5e7eb; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
  <div class="flex">
    <!-- Sidebar -->
    <nav class="w-56 min-h-screen bg-gray-900 border-r border-gray-800 p-4 flex flex-col shrink-0">
      <div class="mb-6">
        <h1 class="text-lg font-bold text-teal-400 tracking-tight">local-rag</h1>
        <p class="text-xs text-gray-500 mt-0.5">semantic search</p>
      </div>

      <div class="space-y-1 flex-1">
        <a href="/"
           class="block px-3 py-2 rounded text-sm {% if request.url.path == '/' %}bg-gray-800 text-teal-300 font-medium{% else %}text-gray-400 hover:text-gray-200 hover:bg-gray-800{% endif %} transition-colors">
          🔍 Search
        </a>
        <a href="/memories"
           class="block px-3 py-2 rounded text-sm {% if request.url.path == '/memories' %}bg-gray-800 text-teal-300 font-medium{% else %}text-gray-400 hover:text-gray-200 hover:bg-gray-800{% endif %} transition-colors">
          🧠 Memories
        </a>
        <a href="/status"
           class="block px-3 py-2 rounded text-sm {% if request.url.path == '/status' %}bg-gray-800 text-teal-300 font-medium{% else %}text-gray-400 hover:text-gray-200 hover:bg-gray-800{% endif %} transition-colors">
          📊 Status
        </a>
        <a href="/digest"
           class="block px-3 py-2 rounded text-sm {% if request.url.path.startswith('/digest') %}bg-gray-800 text-teal-300 font-medium{% else %}text-gray-400 hover:text-gray-200 hover:bg-gray-800{% endif %} transition-colors">
          📋 Digest
        </a>
        <a href="/spotlight"
           class="block px-3 py-2 rounded text-sm {% if request.url.path.startswith('/spotlight') %}bg-gray-800 text-teal-300 font-medium{% else %}text-gray-400 hover:text-gray-200 hover:bg-gray-800{% endif %} transition-colors">
          ⚡ Spotlight
        </a>
      </div>

      <div class="border-t border-gray-800 pt-3 mt-4 text-xs text-gray-500">
        <div>chunks: <span class="text-gray-300">{{ stats.total_chunks }}</span></div>
        <div>files: <span class="text-gray-300">{{ stats.total_files }}</span></div>
        <div>memories: <span class="text-gray-300">{{ memory_count }}</span></div>
        <div>spotlight chunks: <span class="text-gray-300">{{ spotlight_chunks|default(0) }}</span></div>
      </div>
    </nav>

    <!-- Main content -->
    <main class="flex-1 p-6 max-w-5xl">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
